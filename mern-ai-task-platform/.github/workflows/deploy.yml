name: CI/CD

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        run: |
          docker build -t sidhanth2020/taskr-backend ./backend
          docker push sidhanth2020/taskr-backend

      - name: Build & Push Worker
        run: |
          docker build -t sidhanth2020/taskr-worker ./worker
          docker push sidhanth2020/taskr-worker

      - name: Build & Push Frontend
        run: |
          docker build -t sidhanth2020/taskr-frontend ./frontend
          docker push sidhanth2020/taskr-frontend