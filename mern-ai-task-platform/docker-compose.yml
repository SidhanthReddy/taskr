version: '3.8'

services:

  mongodb:
    image: mongo
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis
    container_name: redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - redis
    environment:
      - MONGO_URI=mongodb://mongodb:27017/mern_ai
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=secret123

  worker:
    build: ./worker
    container_name: worker
    depends_on:
      - redis
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017/mern_ai
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data: